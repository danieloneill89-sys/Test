<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>An Áit · Irish Geo-History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       An Áit — "dark archival" theme v2
       Near-black ground, map-grid texture, amber lamplight.
       Fraunces serif for the human voice; JetBrains Mono for data.
       ============================================================ */
    :root {
      --bg:           #0c0c0e;
      --panel:        #141417;
      --panel-2:      #1a1a1e;
      --ink:          #ece6da;
      --muted:        #837d70;
      --faint:        rgba(236,230,218,0.12);
      --accent:       #d9a441;
      --accent-2:     #e8be63;
      --accent-soft:  rgba(217,164,65,0.12);
      --accent-mid:   rgba(217,164,65,0.25);
      --accent-border:rgba(217,164,65,0.35);
      --serif: "Fraunces", Georgia, "Times New Roman", serif;
      --mono:  "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--serif);
      min-height: 100vh;
      background-image:
        radial-gradient(900px 480px at 50% -8%, var(--accent-soft) 0%, transparent 60%),
        linear-gradient(rgba(236,230,218,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(236,230,218,0.022) 1px, transparent 1px);
      background-size: 100% 100%, 64px 64px, 64px 64px;
    }

    /* ---- Keyframes ---- */
    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes irish-reveal {
      from { opacity: 0; transform: translateY(20px); letter-spacing: 0.06em; }
      to   { opacity: 1; transform: none; letter-spacing: -0.02em; }
    }
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 0   0  rgba(217,164,65,0);    border-color: var(--accent-border); }
      50%       { box-shadow: 0 0 22px 4px rgba(217,164,65,0.22); border-color: var(--accent); }
    }
    @keyframes count-pop {
      0%   { transform: scale(0.7); opacity: 0; }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1);   opacity: 1; }
    }
    @keyframes status-in {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: none; }
    }

    .rise { animation: rise 0.65s cubic-bezier(0.2, 0.7, 0.2, 1) both; }

    /* Stagger: invisible until JS fires the animation */
    .stagger { opacity: 0; }
    .stagger.rise { animation: rise 0.65s cubic-bezier(0.2, 0.7, 0.2, 1) both; }

    /* ---- Floating header pill ---- */
    header {
      position: sticky; top: 14px; z-index: 20;
      max-width: 1040px; margin: 14px auto 0; padding: 0 18px;
    }
    .pill {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 22px; border: 1px solid var(--faint); border-radius: 16px;
      background: rgba(18,18,21,0.6); backdrop-filter: blur(12px);
    }
    .wordmark { font-family: var(--mono); font-size: 0.92rem; font-weight: 700;
      letter-spacing: 0.32em; color: var(--ink); }
    .pill .tag { font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--muted); }

    /* ---- Layout ---- */
    main { max-width: 1040px; margin: 0 auto; padding: 0 26px; }

    /* ---- Hero ---- */
    .hero { padding: 80px 0 36px; }
    .eyebrow { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.34em;
      text-transform: uppercase; color: var(--accent); margin: 0 0 22px; }
    .eyebrow::before { content: "// "; opacity: 0.6; }
    h1.title {
      font-family: var(--serif); font-optical-sizing: auto;
      font-weight: 900; font-size: clamp(3.6rem, 14vw, 8.5rem);
      line-height: 0.92; letter-spacing: -0.02em; margin: 0;
    }
    h1.title .accent { color: var(--accent); font-style: italic; font-weight: 400; }
    .tagline { margin: 26px 0 0; font-size: clamp(1.25rem, 3.4vw, 1.9rem);
      line-height: 1.3; font-weight: 300; max-width: 560px; }
    .tagline .b { color: var(--muted); }
    .tagline .a { color: var(--accent); }

    /* ---- Search panel ---- */
    .panel {
      margin: 44px 0; border: 1px solid var(--faint); border-radius: 18px;
      background: linear-gradient(180deg, rgba(26,26,30,0.7), rgba(18,18,21,0.5));
      padding: 30px;
    }
    .field-grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: 20px; }
    label { display: block; font-family: var(--mono); font-size: 0.66rem;
      letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted);
      margin-bottom: 10px; }
    label .opt { color: #5b564c; }
    input[type="text"] {
      width: 100%; padding: 14px 16px; background: var(--bg);
      border: 1px solid var(--faint); border-radius: 10px; color: var(--ink);
      font-family: var(--serif); font-size: 1.15rem;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }
    input[type="text"]::placeholder { color: #524d44; font-style: italic; }
    input[type="text"]:focus { outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft); }

    .radius-row { margin-top: 24px; }
    .radius-row label { display: flex; justify-content: space-between; align-items: baseline; }
    .radius-row .val { font-family: var(--mono); color: var(--accent); font-size: 0.8rem;
      letter-spacing: 0.1em; }
    input[type="range"] { width: 100%; margin-top: 4px; accent-color: var(--accent);
      background: transparent; }

    /* ---- Button ---- */
    .btn {
      margin-top: 26px; width: 100%; padding: 16px 20px; cursor: pointer;
      background: transparent; border: 1px solid var(--accent); border-radius: 10px;
      color: var(--accent); font-family: var(--mono); font-size: 0.82rem;
      font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      transition: background 0.18s ease, color 0.18s ease, transform 0.05s ease;
    }
    .btn:hover  { background: var(--accent); color: var(--bg); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.5; cursor: wait; }

    /* ---- Loading status: cycling phase messages ---- */
    #status {
      font-family: var(--mono); font-size: 0.82rem; letter-spacing: 0.06em;
      color: var(--muted); margin: 10px 2px 0; min-height: 1.4em;
    }
    #status .cursor { color: var(--accent); animation: blink 1.1s steps(1) infinite; }
    #status .phase-msg { animation: status-in 0.3s ease both; }

    /* ---- Result ---- */
    #result { display: none; padding: 14px 0 40px; }

    /* ---- Place header ---- */
    .place-head { padding-bottom: 22px; border-bottom: 1px solid var(--faint); }
    .irish-name {
      font-family: var(--serif); font-optical-sizing: auto; font-weight: 900;
      font-size: clamp(2.8rem, 9vw, 5.5rem); line-height: 0.94;
      letter-spacing: -0.02em; margin: 0; color: var(--ink);
      animation: irish-reveal 1s cubic-bezier(0.15, 0.8, 0.2, 1) 0.05s both;
    }
    .place-english { font-family: var(--mono); font-size: 0.8rem; letter-spacing: 0.24em;
      text-transform: uppercase; color: var(--accent); margin: 16px 0 0; }
    .place-meta { font-family: var(--mono); font-size: 0.78rem; color: var(--muted);
      margin-top: 10px; letter-spacing: 0.04em; }
    .place-meta a { color: var(--ink); text-decoration: none;
      border-bottom: 1px solid var(--accent); }
    .place-meta a:hover { color: var(--accent); }
    .dot { color: #4a463d; margin: 0 10px; }

    /* ---- Stats strip ---- */
    .stats-strip {
      display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
      padding: 18px 0; border-bottom: 1px solid var(--faint);
    }
    .stat-pill {
      display: inline-flex; align-items: baseline; gap: 7px;
      padding: 6px 14px; border: 1px solid var(--accent-border);
      border-radius: 20px; background: var(--accent-soft);
    }
    .stat-label {
      font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--muted);
    }
    .stat-value {
      font-family: var(--mono); font-size: 0.88rem; color: var(--ink);
    }
    .stat-num {
      font-family: var(--mono); font-size: 1.05rem; font-weight: 700;
      color: var(--accent);
      animation: count-pop 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) 0.3s both;
    }

    /* ---- Curiosity callout ---- */
    .curiosity {
      margin-top: 24px; padding: 18px 22px;
      border: 1px solid var(--accent-border); border-radius: 14px;
      background: var(--accent-soft);
      animation: glow-pulse 3s ease 0.8s 2;
    }
    .curio-label {
      display: block; font-family: var(--mono); font-size: 0.64rem;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 8px;
    }
    .curio-text {
      font-family: var(--serif); font-size: 1.08rem; line-height: 1.6;
      color: var(--ink); font-style: italic;
    }

    /* ---- Synthesis ---- */
    .synthesis {
      font-family: var(--serif); font-weight: 400; font-size: 1.18rem;
      line-height: 1.74; max-width: 700px; color: #dcd6c9;
      margin-top: 30px;
    }
    .synthesis .para { margin: 0 0 1.2em; }
    .synthesis h2 { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.24em;
      text-transform: uppercase; color: var(--accent); margin: 2em 0 0.8em; }
    .synthesis b  { color: var(--ink); font-weight: 600; }
    .synthesis em { color: var(--accent-2); font-style: italic; }

    /* ---- Evidence drawer ---- */
    /* Townland shape — an amber "engraving" of the OSM boundary. Floats into
       the right gutter beside the synthesis on wide screens; centres and stacks
       above the prose on narrow ones. */
    .townland-fig {
      float: right; width: 190px; margin: 30px 0 16px 30px; text-align: center;
    }
    .townland-shape {
      width: 100%; height: auto; display: block;
      filter: drop-shadow(0 8px 22px rgba(0,0,0,0.5));
    }
    .townland-shape .ts-neighbour {
      fill: rgba(217,164,65,0.04); stroke: var(--accent);
      stroke-width: 0.5; stroke-linejoin: round; opacity: 0.45;
    }
    .townland-shape .ts-main {
      fill: var(--accent-soft); stroke: var(--accent);
      stroke-width: 1.1; stroke-linejoin: round; paint-order: stroke fill;
    }
    .townland-shape .ts-centre { fill: var(--accent-2); }
    .townland-fig figcaption {
      font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted); margin-top: 12px; line-height: 1.8;
    }
    .townland-fig .ts-src { color: var(--accent); opacity: 0.85; }
    .townland-fig .ts-neighbours {
      color: var(--accent); opacity: 0.85; text-decoration: none;
      border-bottom: 1px solid var(--accent-border);
    }
    .townland-fig .ts-neighbours:hover { opacity: 1; }
    @media (max-width: 760px) {
      .townland-fig { float: none; width: 152px; margin: 24px auto 8px; }
    }

    /* Neighbouring townlands list */
    .neighbour-section {
      clear: both; margin-top: 28px; padding-top: 20px;
      border-top: 1px solid var(--faint);
    }
    .neighbour-label {
      font-family: var(--mono); font-size: 0.64rem; letter-spacing: 0.26em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
    }
    .neighbour-pills {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .neighbour-pill {
      font-family: var(--mono); font-size: 0.78rem;
      padding: 6px 14px; border: 1px solid var(--accent-border);
      border-radius: 20px; background: var(--accent-soft);
      color: var(--ink); cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .neighbour-pill:hover {
      background: var(--accent-mid); color: var(--accent-2);
    }

    details.evidence {
      clear: both;
      margin-top: 40px; border-top: 1px solid var(--faint); padding-top: 18px;
    }
    details.evidence summary {
      cursor: pointer; list-style: none; font-family: var(--mono);
      font-size: 0.7rem; letter-spacing: 0.24em; text-transform: uppercase;
      color: var(--muted); display: flex; align-items: center; gap: 10px;
      user-select: none;
    }
    details.evidence summary::-webkit-details-marker { display: none; }
    details.evidence summary::before { content: "[ + ]"; color: var(--accent); }
    details.evidence[open] summary::before { content: "[ – ]"; }
    details.evidence summary:hover { color: var(--ink); }

    /* Etymology pills */
    .ety { margin: 22px 0 10px; display: flex; flex-wrap: wrap; gap: 8px; }
    .ety-pill {
      font-family: var(--mono); font-size: 0.78rem;
      border: 1px solid var(--faint); border-radius: 8px; padding: 7px 13px;
      color: var(--muted); transition: border-color 0.15s, color 0.15s;
    }
    .ety-pill:hover { border-color: var(--accent-border); color: var(--ink); }
    .ety-pill b { color: var(--accent); font-weight: 500; }

    /* Monument cards */
    .mon-cards { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
    .mon-card {
      padding: 14px 18px; border: 1px solid rgba(236,230,218,0.07);
      border-radius: 12px; background: rgba(20,20,23,0.6);
      transition: border-color 0.18s, background 0.18s;
    }
    .mon-card:hover {
      border-color: var(--accent-border); background: rgba(26,26,30,0.9);
    }
    .mon-top {
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
    }
    .mon-left  { display: flex; align-items: center; gap: 10px; }
    .mon-icon  {
      font-family: var(--mono); font-size: 0.88rem; color: var(--accent);
      width: 20px; text-align: center; flex-shrink: 0; opacity: 0.85;
    }
    .mon-type  { font-family: var(--serif); font-size: 1.05rem; font-weight: 600; color: var(--ink); }
    .mon-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
    .mon-smr   { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); letter-spacing: 0.04em; }
    .mon-dist  { font-family: var(--mono); font-size: 0.74rem; color: var(--accent); }
    .mon-note  {
      font-family: var(--serif); font-size: 0.95rem; line-height: 1.6;
      color: var(--muted); margin-top: 8px; max-width: 700px;
    }

    .empty { font-family: var(--mono); font-size: 0.8rem; color: var(--muted); padding: 12px 0; }

    /* Evidence sub-sections */
    .ev-section-label {
      font-family: var(--mono); font-size: 0.64rem; letter-spacing: 0.24em;
      text-transform: uppercase; color: var(--muted); margin: 20px 0 10px;
    }
    .ev-section-label a { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--faint); }
    .ev-section-label a:hover { color: var(--accent); }

    /* Historical name forms */
    .hist-forms { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
    .hist-pill {
      display: inline-flex; align-items: baseline; gap: 7px;
      font-family: var(--mono); font-size: 0.78rem;
      border: 1px solid var(--faint); border-radius: 8px; padding: 6px 12px;
    }
    .hist-form   { color: var(--ink); font-weight: 500; }
    .hist-date   { color: var(--accent); font-size: 0.7rem; }
    .hist-source { color: var(--muted); font-size: 0.68rem; font-style: italic; }

    /* Wikipedia excerpt */
    .wiki-block { margin-bottom: 8px; }
    .wiki-text {
      font-family: var(--serif); font-size: 0.96rem; line-height: 1.65;
      color: var(--muted); max-width: 700px; padding: 12px 16px;
      border-left: 2px solid var(--faint); margin-top: 6px;
    }

    /* NIAH building cards */
    .bld-cards { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    .bld-card {
      padding: 14px 18px; border: 1px solid rgba(236,230,218,0.07);
      border-radius: 12px; background: rgba(20,20,23,0.6);
      transition: border-color 0.18s, background 0.18s;
    }
    .bld-card:hover {
      border-color: var(--accent-border); background: rgba(26,26,30,0.9);
    }
    .bld-top {
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
    }
    .bld-left  { display: flex; align-items: center; gap: 10px; }
    .bld-icon  {
      font-family: var(--mono); font-size: 0.88rem; color: var(--accent-2);
      width: 20px; text-align: center; flex-shrink: 0; opacity: 0.85;
    }
    .bld-name  { font-family: var(--serif); font-size: 1.05rem; font-weight: 600; color: var(--ink); }
    .bld-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .bld-rating {
      font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.12em;
      padding: 3px 8px; border-radius: 6px; text-transform: uppercase;
    }
    .bld-rating.N { background: rgba(217,164,65,0.22); color: var(--accent); border: 1px solid var(--accent-border); }
    .bld-rating.R { background: rgba(236,230,218,0.08); color: var(--ink); border: 1px solid var(--faint); }
    .bld-rating.L { background: transparent; color: var(--muted); border: 1px solid rgba(236,230,218,0.1); }
    .bld-dist  { font-family: var(--mono); font-size: 0.74rem; color: var(--accent); }
    .bld-meta  {
      font-family: var(--mono); font-size: 0.76rem; color: var(--muted);
      margin-top: 6px; letter-spacing: 0.02em;
    }
    .bld-regno { font-size: 0.68rem; color: #5b564c; margin-left: 8px;
      text-decoration: none; }
    a.bld-regno:hover { color: var(--accent); }

    /* ---- County picker (ambiguous) ---- */
    .ambiguous p { font-family: var(--mono); font-size: 0.85rem;
      color: var(--ink); letter-spacing: 0.04em; margin: 0 0 18px; }
    .county-pick {
      display: inline-flex; align-items: center; gap: 8px;
      margin: 0 10px 10px 0; padding: 10px 16px; cursor: pointer;
      background: transparent; border: 1px solid var(--faint); border-radius: 9px;
      color: var(--ink); font-family: var(--mono); font-size: 0.78rem;
      letter-spacing: 0.12em; transition: border-color 0.16s, color 0.16s;
    }
    .county-pick:hover { border-color: var(--accent); color: var(--accent); }

    /* ---- Colophon footer ---- */
    footer { max-width: 1040px; margin: 40px auto 0; padding: 40px 26px 60px;
      border-top: 1px solid var(--faint); }
    .colophon { display: grid; grid-template-columns: repeat(2, 1fr); gap: 34px 24px; }
    .col-label { font-family: var(--mono); font-size: 0.64rem; letter-spacing: 0.26em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .col-body  { font-family: var(--mono); font-size: 0.86rem; line-height: 1.9; color: var(--ink); }
    .col-body a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--faint); }
    .col-body a:hover { color: var(--accent); border-color: var(--accent); }

    @media (max-width: 620px) {
      .field-grid { grid-template-columns: 1fr; }
      .hero { padding: 56px 0 24px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="pill">
      <span class="wordmark">AN&nbsp;ÁIT</span>
      <span class="tag">Éire · geo-history</span>
    </div>
  </header>

  <main>
    <section class="hero">
      <p class="eyebrow rise">Irish townland histories</p>
      <h1 class="title rise" style="animation-delay:0.06s">An <span class="accent">Áit</span></h1>
      <p class="tagline rise" style="animation-delay:0.12s">
        <span class="b">The name remembers.</span><br>
        <span class="a">The land remembers.</span>
      </p>
    </section>

    <section class="panel rise" style="animation-delay:0.18s">
      <div class="field-grid">
        <div>
          <label for="townland">Townland</label>
          <input type="text" id="townland" placeholder="e.g. Ballinakill" autocomplete="off">
        </div>
        <div>
          <label for="county">County <span class="opt">— optional</span></label>
          <input type="text" id="county" placeholder="e.g. Laois" autocomplete="off">
        </div>
      </div>

      <div class="radius-row">
        <label for="radius">Search the land within
          <span class="val"><span id="radiusVal">2.0</span> km</span>
        </label>
        <input type="range" id="radius" min="0.5" max="10" step="0.5" value="2">
      </div>

      <button class="btn" id="go" onclick="lookup()">
        Reveal the history ↗
      </button>
      <div id="status"></div>
    </section>

    <section id="result"></section>
  </main>

  <footer>
    <div class="colophon">
      <div>
        <div class="col-label">Sources</div>
        <div class="col-body">
          <a href="https://www.logainm.ie" target="_blank" rel="noopener">Logainm.ie</a><br>
          <a href="https://www.archaeology.ie" target="_blank" rel="noopener">Archaeological Survey</a><br>
          <a href="https://www.buildingsofireland.ie" target="_blank" rel="noopener">Buildings of Ireland</a>
        </div>
      </div>
      <div>
        <div class="col-label">Synthesis</div>
        <div class="col-body">Claude (Haiku)<br>grounded in records</div>
      </div>
      <div>
        <div class="col-label">Licence</div>
        <div class="col-body">Data CC&nbsp;BY&nbsp;4.0</div>
      </div>
      <div>
        <div class="col-label">Year</div>
        <div class="col-body">2026<br>Ongoing</div>
      </div>
    </div>
  </footer>

<script>
  // ---- Radius slider ----
  const radiusSlider = document.getElementById('radius');
  const radiusVal    = document.getElementById('radiusVal');
  radiusSlider.addEventListener('input', () =>
    radiusVal.textContent = (+radiusSlider.value).toFixed(1));

  // ---- Enter key submits ----
  ['townland', 'county'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') lookup();
    }));

  // ---- Cycling loading messages ----
  const PHASES = [
    '// reading the name',
    '// tracing the boundary',
    '// searching the land',
    '// consulting the records',
    '// checking built heritage',
    '// checking wikipedia',
    '// writing the history',
  ];
  let loadTimer = null;
  let loadPhase = 0;

  function startLoading() {
    const el = document.getElementById('status');
    loadPhase = 0;
    el.innerHTML = `<span class="phase-msg">${PHASES[0]}<span class="cursor">_</span></span>`;
    loadTimer = setInterval(() => {
      loadPhase = (loadPhase + 1) % PHASES.length;
      el.innerHTML = `<span class="phase-msg">${PHASES[loadPhase]}<span class="cursor">_</span></span>`;
    }, 2400);
  }

  function stopLoading() {
    clearInterval(loadTimer);
    loadTimer = null;
    document.getElementById('status').textContent = '';
  }

  // ---- Safe markdown → HTML ----
  function format(text) {
    const esc = text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return esc
      .replace(/^#{1,6}\s*(.+)$/gm, '<h2>$1</h2>')
      .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .split(/\n\s*\n/)
      .map(p => p.startsWith('<h2>') ? p : '<p class="para stagger">' + p.trim() + '</p>')
      .join('');
  }

  // ---- Pull CURIOSITY line out of synthesis ----
  function extractCuriosity(raw) {
    const m = raw.match(/\nCURIOSITY:\s*(.+?)$/m);
    if (m) {
      return {
        curiosity: m[1].trim(),
        text: raw.replace(/\nCURIOSITY:.*$/m, '').trim(),
      };
    }
    return { curiosity: null, text: raw };
  }

  // ---- NIAH building use → glyph ----
  const BLD_ICONS = {
    mill: '⊕', windmill: '⊕',
    church: '†', chapel: '†', cathedral: '†',
    castle: '▲', tower: '▲',
    house: '⬡', farmhouse: '⬡', dwelling: '⬡', cottage: '⬡',
    forge: '◈', barn: '◈', stable: '◈',
    bridge: '≋',
    school: '⬡', office: '⬡',
  };
  function bldIcon(use) {
    if (!use) return '◻';
    const u = use.toLowerCase();
    for (const [k, v] of Object.entries(BLD_ICONS)) {
      if (u.includes(k)) return v;
    }
    return '◻';
  }

  // ---- Monument type → glyph ----
  const TYPE_ICONS = {
    ringfort: '◎', enclosure: '◎', rath: '◎',
    church: '†', ecclesiastical: '†', graveyard: '†', monastic: '†',
    well: '≈', spring: '≈',
    castle: '▲', motte: '▲', tower: '▲',
    mill: '⊕', windmill: '⊕',
    settlement: '⬡', house: '⬡',
    cairn: '△', barrow: '△', tumulus: '△',
    standing: '|', stone: '|',
  };
  function monIcon(type) {
    if (!type) return '·';
    const t = type.toLowerCase();
    for (const [k, v] of Object.entries(TYPE_ICONS)) {
      if (t.includes(k)) return v;
    }
    return '·';
  }

  // ---- Townland shape ----
  // Draws the OSM boundary ring as a small SVG "engraving". Longitude is scaled
  // by cos(lat) so the shape isn't stretched sideways (a degree of longitude is
  // shorter than a degree of latitude away from the equator). Returns '' when we
  // have no real polygon — we never invent a shape we don't have a record for.
  function townlandFigure(boundary, place, neighbours) {
    if (!boundary || !Array.isArray(boundary.polygon) || boundary.polygon.length < 3) return '';
    neighbours = (neighbours || []).filter(n => Array.isArray(n.polygon) && n.polygon.length >= 3);

    const ring = boundary.polygon;                       // [[lon, lat], ...]

    // Build a shared projection across main shape + all neighbours so they
    // all sit in the same coordinate space before we fit to the viewBox.
    const allRings = [ring, ...neighbours.map(n => n.polygon)];
    const lat0 = ring.reduce((s, pt) => s + pt[1], 0) / ring.length;
    const k = Math.cos(lat0 * Math.PI / 180) || 1;
    const proj = ([lon, lat]) => [lon * k, lat];

    const allPts = allRings.flatMap(r => r.map(proj));
    const xs = allPts.map(pt => pt[0]), ys = allPts.map(pt => pt[1]);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    const w = (maxX - minX) || 1e-9, h = (maxY - minY) || 1e-9;
    const SIZE = 100, PAD = 6;
    const scale = (SIZE - 2 * PAD) / Math.max(w, h);
    const offX = PAD + ((SIZE - 2 * PAD) - w * scale) / 2;
    const offY = PAD + ((SIZE - 2 * PAD) - h * scale) / 2;
    const sx = x => offX + (x - minX) * scale;
    const sy = y => offY + (maxY - y) * scale;            // flip: north is up

    const toPath = r => r.map(proj).map(([x, y], i) =>
      (i ? 'L' : 'M') + sx(x).toFixed(2) + ' ' + sy(y).toFixed(2)).join(' ') + ' Z';

    // Neighbour shapes — muted, behind the main shape.
    const neighbourPaths = neighbours.map(n =>
      `<path class="ts-neighbour" d="${toPath(n.polygon)}"/>`).join('');

    // Main townland shape.
    const mainPath = `<path class="ts-main" d="${toPath(ring)}"/>`;

    // Centre dot — only when it falls inside the main shape's projected extent.
    const mainPts = ring.map(proj);
    const mxs = mainPts.map(p => p[0]), mys = mainPts.map(p => p[1]);
    const mMinX = Math.min(...mxs), mMaxX = Math.max(...mxs);
    const mMinY = Math.min(...mys), mMaxY = Math.max(...mys);
    let centre = '';
    if (place && typeof place.latitude === 'number' && typeof place.longitude === 'number') {
      const [cx, cy] = proj([place.longitude, place.latitude]);
      if (cx >= mMinX && cx <= mMaxX && cy >= mMinY && cy <= mMaxY)
        centre = `<circle class="ts-centre" cx="${sx(cx).toFixed(2)}" cy="${sy(cy).toFixed(2)}" r="1.6"/>`;
    }

    const area = boundary.area_km2 ? ` · ${boundary.area_km2} km²` : '';
    const nLabel = neighbours.length ? ` · ${neighbours.length} adjacent` : '';

    // Link to the OSM relation — reliable since we have the exact osm_id.
    let townlandsLink = '';
    if (boundary && boundary.osm_id) {
      const url = `https://www.openstreetmap.org/relation/${boundary.osm_id}`;
      townlandsLink = `<br><a class="ts-neighbours" href="${url}" target="_blank" rel="noopener">view on OpenStreetMap ↗</a>`;
    }

    return `
      <figure class="townland-fig stagger">
        <svg class="townland-shape" viewBox="0 0 ${SIZE} ${SIZE}" role="img"
             aria-label="Outline of the townland and its neighbours">
          ${neighbourPaths}${mainPath}${centre}
        </svg>
        <figcaption>townland outline${area}${nLabel}<br><span class="ts-src">OpenStreetMap</span>${townlandsLink}</figcaption>
      </figure>`;
  }

  // ---- Neighbour search ----
  function searchNeighbour(name, county) {
    document.getElementById('townland').value = name;
    document.getElementById('county').value = county || '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    lookup();
  }

  // ---- Count-up animation ----
  function animateCount(el, target, ms) {
    ms = ms || 700;
    const t0 = performance.now();
    (function frame(now) {
      const p = Math.min((now - t0) / ms, 1);
      el.textContent = Math.round(p * target);
      if (p < 1) requestAnimationFrame(frame);
    })(t0);
  }

  // ---- Main fetch ----
  async function lookup(forceCounty) {
    const townland = document.getElementById('townland').value.trim();
    const county = forceCounty !== undefined
      ? forceCounty
      : document.getElementById('county').value.trim();
    if (forceCounty !== undefined) document.getElementById('county').value = forceCounty;

    const btn = document.getElementById('go');
    const resultEl = document.getElementById('result');

    btn.disabled = true;
    resultEl.style.display = 'none';
    startLoading();

    try {
      const res = await fetch('/lookup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ townland, county, radius: radiusSlider.value }),
      });
      const data = await res.json();
      stopLoading();
      render(data);
    } catch (e) {
      stopLoading();
      document.getElementById('status').textContent =
        '! something went wrong reaching the server.';
    } finally {
      btn.disabled = false;
    }
  }

  // ---- Render result ----
  function render(data) {
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');

    if (data.status === 'not_found') {
      statusEl.textContent =
        '∅ no place of that name was found. check spelling or try without a county.';
      return;
    }
    if (data.status === 'error') {
      statusEl.textContent = '! ' + data.message;
      return;
    }
    if (data.status === 'ambiguous') {
      let html = '<div class="ambiguous"><p>That name appears in several counties. Which one?</p>';
      data.counties.forEach(c =>
        html += `<button class="county-pick" onclick="lookup('${c}')">${c} ↗</button>`);
      html += '</div>';
      show(resultEl, html);
      return;
    }

    const p     = data.place;
    const nMon  = data.monuments.length;
    const coord = p.latitude
      ? p.latitude.toFixed(4) + ', ' + p.longitude.toFixed(4) : null;
    const radiusUsed = (+radiusSlider.value).toFixed(1);

    const { curiosity, text: synthText } = extractCuriosity(data.synthesis);

    // ---- Place header ----
    let html = `
      <div class="place-head">
        <h2 class="irish-name">${p.irish_name || p.english_name}</h2>
        <div class="place-english stagger">
          ${p.english_name}${p.irish_genitive ? ' · gen. ' + p.irish_genitive : ''}
        </div>
        <div class="place-meta stagger">
          ${(p.feature_type || '').toUpperCase()}
          <span class="dot">·</span>Co. ${p.county || '—'}
          ${coord ? '<span class="dot">·</span>' + coord : ''}
          ${p.logainm_url
            ? '<span class="dot">·</span><a href="' + p.logainm_url
              + '" target="_blank" rel="noopener">Logainm ↗</a>'
            : ''}
        </div>
      </div>`;

    // ---- Stats strip ----
    const nBld = (data.buildings || []).length;
    // If we resolved a real townland boundary, the monument search was confined
    // to the townland itself — show its area instead of a search radius.
    const bnd = data.boundary;
    const scopePill = (bnd && bnd.area_km2)
      ? `<span class="stat-pill">
           <span class="stat-label">townland</span>
           <span class="stat-value">${bnd.area_km2} km²</span>
         </span>`
      : `<span class="stat-pill">
           <span class="stat-label">radius</span>
           <span class="stat-value">${radiusUsed} km</span>
         </span>`;
    html += `
      <div class="stats-strip stagger">
        <span class="stat-pill">
          <span class="stat-label">monuments</span>
          <span class="stat-num" id="monCount">0</span>
        </span>
        <span class="stat-pill">
          <span class="stat-label">buildings</span>
          <span class="stat-num" id="bldCount">0</span>
        </span>
        ${scopePill}
        ${coord ? `<span class="stat-pill">
          <span class="stat-label">coord</span>
          <span class="stat-value">${coord}</span>
        </span>` : ''}
      </div>`;

    // ---- Curiosity callout ----
    if (curiosity) {
      html += `
        <div class="curiosity stagger">
          <span class="curio-label">// curiosity</span>
          <div class="curio-text">${curiosity}</div>
        </div>`;
    }

    // ---- Townland shape (sits in the right gutter beside the synthesis) ----
    html += townlandFigure(data.boundary, p, data.neighbours || []);

    // ---- Synthesis ----
    html += `<div class="synthesis">${format(synthText)}</div>`;

    // ---- Neighbouring townlands ----
    const neighbours = (data.neighbours || []).filter(n => n.name);
    if (neighbours.length) {
      html += `<div class="neighbour-section">
        <div class="neighbour-label">// neighbouring townlands</div>
        <div class="neighbour-pills">`;
      neighbours.forEach(n => {
        const county = p.county || '';
        html += `<button class="neighbour-pill"
          onclick="searchNeighbour(${JSON.stringify(n.name)}, ${JSON.stringify(county)})"
        >${n.name}${n.name_ga ? ' · ' + n.name_ga : ''}</button>`;
      });
      html += `</div></div>`;
    }

    // ---- Evidence drawer ----
    const wiki = (data.wikipedia || []).filter(w => w.found);
    const buildings = data.buildings || [];
    const hasHistForms = p.historical_forms && p.historical_forms.length;
    const summaryParts = [`${nMon} monument${nMon === 1 ? '' : 's'}`];
    if (nBld)         summaryParts.push(`${nBld} building${nBld === 1 ? '' : 's'}`);
    if (hasHistForms) summaryParts.push(`${p.historical_forms.length} name form${p.historical_forms.length === 1 ? '' : 's'}`);
    if (wiki.length)  summaryParts.push('Wikipedia');

    html += `
      <details class="evidence stagger">
        <summary>Evidence · ${summaryParts.join(' · ')}</summary>`;

    // Etymology
    if (p.etymology && p.etymology.length) {
      html += '<div class="ety">';
      p.etymology.forEach(e =>
        html += `<span class="ety-pill"><b>${e.word}</b> — ${e.meaning}</span>`);
      html += '</div>';
    }

    // Historical name forms
    if (hasHistForms) {
      html += '<div class="ev-section-label">// name across time</div><div class="hist-forms">';
      p.historical_forms.forEach(f => {
        html += `<span class="hist-pill">
          <span class="hist-form">${f.form}</span>
          ${f.date ? `<span class="hist-date">${f.date}</span>` : ''}
          ${f.source ? `<span class="hist-source">${f.source}</span>` : ''}
        </span>`;
      });
      html += '</div>';
    }

    // Wikipedia excerpt
    if (wiki.length) {
      wiki.forEach(w => {
        html += `<div class="wiki-block">
          <div class="ev-section-label">// wikipedia · <a href="${w.url}" target="_blank" rel="noopener">${w.title} ↗</a></div>
          <div class="wiki-text">${w.extract}</div>
        </div>`;
      });
    }

    // NIAH building cards
    if (buildings.length) {
      html += '<div class="ev-section-label">// built heritage · niah c.1700–1960</div>';
      html += '<div class="bld-cards">';
      buildings.forEach(b => {
        const bIcon = bldIcon(b.original_use);
        // RATING is a full word ("National"/"Regional"/"Local"); the CSS badge
        // classes are keyed on the first letter (N/R/L).
        const rCode = (b.rating || '').trim().charAt(0).toUpperCase();
        const regHtml = b.reg_no
          ? (b.url
              ? `<a class="bld-regno" href="${b.url}" target="_blank" rel="noopener">${b.reg_no} ↗</a>`
              : `<span class="bld-regno">${b.reg_no}</span>`)
          : '';
        html += `
          <div class="bld-card">
            <div class="bld-top">
              <div class="bld-left">
                <span class="bld-icon">${bIcon}</span>
                <span class="bld-name">${b.name || b.original_use || 'Building'}</span>
              </div>
              <div class="bld-right">
                ${rCode ? `<span class="bld-rating ${rCode}">${b.rating_label || b.rating}</span>` : ''}
                <span class="bld-dist">${b.distance_km} km</span>
              </div>
            </div>
            <div class="bld-meta">
              ${b.original_use ? b.original_use : ''}
              ${b.date_text ? ' · ' + b.date_text : ''}
              ${regHtml}
            </div>
          </div>`;
      });
      html += '</div>';
    }

    // Monument cards
    html += '<div class="mon-cards">';
    if (nMon) {
      data.monuments.forEach(m => {
        const note = (m.description || '').replace(/\s+/g, ' ').slice(0, 320);
        html += `
          <div class="mon-card">
            <div class="mon-top">
              <div class="mon-left">
                <span class="mon-icon">${monIcon(m.monument_class)}</span>
                <span class="mon-type">${m.monument_class || 'Unknown'}</span>
              </div>
              <div class="mon-right">
                ${m.smr_number ? `<span class="mon-smr">${m.smr_number}</span>` : ''}
                <span class="mon-dist">${m.distance_km} km</span>
              </div>
            </div>
            ${note
              ? `<div class="mon-note">${note}${note.length >= 320 ? '…' : ''}</div>`
              : ''}
          </div>`;
      });
    } else {
      html += '<p class="empty">No recorded monuments within this radius.</p>';
    }
    html += '</div></details>';

    show(resultEl, html);

    // Animate counters after DOM is in place
    requestAnimationFrame(() => {
      const mc = document.getElementById('monCount');
      if (mc) animateCount(mc, nMon);
      const bc = document.getElementById('bldCount');
      if (bc) animateCount(bc, nBld);
    });
  }

  // ---- Show result with staggered rise ----
  function show(el, html) {
    el.innerHTML = html;
    el.style.display = 'block';

    // Assign staggered delays to every .stagger descendant (incl. synthesis .para)
    el.querySelectorAll('.stagger').forEach((child, i) => {
      child.style.animationDelay = i * 0.09 + 's';
      child.classList.add('rise');
    });

    // Scroll result into view after a beat
    setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }
</script>
</body>
</html>
