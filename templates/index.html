<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>An Áit · Irish Geo-History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       An Áit — "dark archival" theme
       A cartographer's terminal: near-black ground, map-grid texture,
       a refined serif for the placenames (the human, historical voice)
       and monospace for the records (coordinates, SMR numbers, data).
       One warm accent — amber, like lamplight on old vellum.
       ============================================================ */
    :root {
      --bg:       #0c0c0e;
      --panel:    #141417;
      --panel-2:  #1a1a1e;
      --ink:      #ece6da;   /* warm off-white, like aged paper */
      --muted:    #837d70;   /* warm grey for secondary text */
      --faint:    rgba(236,230,218,0.12);
      --accent:   #d9a441;   /* amber / old-map gold */
      --accent-2: #e8be63;
      --accent-soft: rgba(217,164,65,0.12);
      --serif: "Fraunces", Georgia, "Times New Roman", serif;
      --mono:  "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--serif);
      min-height: 100vh;
      /* Faint map graticule + a soft amber glow up top, like a lamp. */
      background-image:
        radial-gradient(900px 480px at 50% -8%, var(--accent-soft) 0%, transparent 60%),
        linear-gradient(rgba(236,230,218,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(236,230,218,0.022) 1px, transparent 1px);
      background-size: 100% 100%, 64px 64px, 64px 64px;
    }

    /* ---- Motion: things rise and settle into place ---- */
    @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    @keyframes blink { 50% { opacity: 0; } }
    .rise { animation: rise 0.7s cubic-bezier(0.2, 0.7, 0.2, 1) both; }

    /* ---- Floating header pill ---- */
    header {
      position: sticky; top: 14px; z-index: 20;
      max-width: 1040px; margin: 14px auto 0; padding: 0 18px;
    }
    .pill {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 22px; border: 1px solid var(--faint); border-radius: 16px;
      background: rgba(18,18,21,0.6); backdrop-filter: blur(12px);
    }
    .wordmark { font-family: var(--mono); font-size: 0.92rem; font-weight: 700;
      letter-spacing: 0.32em; color: var(--ink); }
    .pill .tag { font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--muted); }

    /* ---- Layout shell ---- */
    main { max-width: 1040px; margin: 0 auto; padding: 0 26px; }

    /* ---- Hero ---- */
    .hero { padding: 80px 0 36px; }
    .eyebrow { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.34em;
      text-transform: uppercase; color: var(--accent); margin: 0 0 22px; }
    .eyebrow::before { content: "// "; opacity: 0.6; }
    h1.title {
      font-family: var(--serif); font-optical-sizing: auto;
      font-weight: 900; font-size: clamp(3.6rem, 14vw, 8.5rem);
      line-height: 0.92; letter-spacing: -0.02em; margin: 0;
    }
    h1.title .accent { color: var(--accent); font-style: italic; font-weight: 400; }
    .tagline { margin: 26px 0 0; font-size: clamp(1.25rem, 3.4vw, 1.9rem);
      line-height: 1.3; font-weight: 300; max-width: 560px; }
    .tagline .b { color: var(--muted); }
    .tagline .a { color: var(--accent); }

    /* ---- Search panel ---- */
    .panel {
      margin: 44px 0; border: 1px solid var(--faint); border-radius: 18px;
      background: linear-gradient(180deg, rgba(26,26,30,0.7), rgba(18,18,21,0.5));
      padding: 30px;
    }
    .field-grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: 20px; }
    label { display: block; font-family: var(--mono); font-size: 0.66rem;
      letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted);
      margin-bottom: 10px; }
    label .opt { color: #5b564c; }
    input[type="text"] {
      width: 100%; padding: 14px 16px; background: var(--bg);
      border: 1px solid var(--faint); border-radius: 10px; color: var(--ink);
      font-family: var(--serif); font-size: 1.15rem;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }
    input[type="text"]::placeholder { color: #524d44; font-style: italic; }
    input[type="text"]:focus { outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft); }

    .radius-row { margin-top: 24px; }
    .radius-row label { display: flex; justify-content: space-between; align-items: baseline; }
    .radius-row .val { font-family: var(--mono); color: var(--accent); font-size: 0.8rem;
      letter-spacing: 0.1em; }
    input[type="range"] { width: 100%; margin-top: 4px; accent-color: var(--accent);
      background: transparent; }

    /* ---- Buttons: outlined, architectural, arrow glyph ---- */
    .btn {
      margin-top: 26px; width: 100%; padding: 16px 20px; cursor: pointer;
      background: transparent; border: 1px solid var(--accent); border-radius: 10px;
      color: var(--accent); font-family: var(--mono); font-size: 0.82rem;
      font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      transition: background 0.18s ease, color 0.18s ease, transform 0.05s ease;
    }
    .btn:hover { background: var(--accent); color: var(--bg); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.5; cursor: wait; }
    .btn .arrow { font-size: 1rem; }

    /* ---- Status / loading: terminal readout ---- */
    #status { font-family: var(--mono); font-size: 0.85rem; letter-spacing: 0.06em;
      color: var(--muted); margin: 8px 2px 0; min-height: 1.2em; }
    #status .cursor { color: var(--accent); animation: blink 1.1s steps(1) infinite; }

    /* ---- Result ---- */
    #result { display: none; padding: 14px 0 40px; }
    .place-head { padding-bottom: 24px; margin-bottom: 30px; border-bottom: 1px solid var(--faint); }
    .place-head .irish { font-family: var(--serif); font-weight: 900;
      font-size: clamp(2.6rem, 8vw, 5rem); line-height: 0.96; letter-spacing: -0.015em;
      margin: 0; }
    .place-head .english { font-family: var(--mono); font-size: 0.8rem; letter-spacing: 0.24em;
      text-transform: uppercase; color: var(--accent); margin: 16px 0 0; }
    .place-head .meta { font-family: var(--mono); font-size: 0.78rem; color: var(--muted);
      margin-top: 10px; letter-spacing: 0.04em; }
    .place-head .meta a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--accent); }
    .place-head .meta a:hover { color: var(--accent); }
    .dot { color: #4a463d; margin: 0 10px; }

    .synthesis { font-family: var(--serif); font-weight: 400; font-size: 1.2rem;
      line-height: 1.72; max-width: 680px; color: #dcd6c9; }
    .synthesis p { margin: 0 0 1.2em; }
    .synthesis h2 { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.24em;
      text-transform: uppercase; color: var(--accent); margin: 2em 0 0.8em; }
    .synthesis b { color: var(--ink); font-weight: 600; }
    .synthesis em { color: var(--accent-2); font-style: italic; }

    /* ---- Evidence drawer ---- */
    details.evidence { margin-top: 40px; border-top: 1px solid var(--faint); padding-top: 18px; }
    details.evidence summary { cursor: pointer; list-style: none; font-family: var(--mono);
      font-size: 0.7rem; letter-spacing: 0.24em; text-transform: uppercase; color: var(--muted);
      display: flex; align-items: center; gap: 10px; user-select: none; }
    details.evidence summary::-webkit-details-marker { display: none; }
    details.evidence summary::before { content: "[ + ]"; color: var(--accent); }
    details.evidence[open] summary::before { content: "[ – ]"; }
    details.evidence summary:hover { color: var(--ink); }

    .ety { margin: 22px 0 8px; display: flex; flex-wrap: wrap; gap: 8px; }
    .ety span { font-family: var(--mono); font-size: 0.78rem; border: 1px solid var(--faint);
      border-radius: 8px; padding: 7px 12px; color: var(--muted); }
    .ety span b { color: var(--accent); font-weight: 500; }

    .mon { padding: 16px 0; border-bottom: 1px solid rgba(236,230,218,0.06); }
    .mon:last-child { border-bottom: none; }
    .mon .top { display: flex; justify-content: space-between; align-items: baseline; gap: 14px; }
    .mon .type { font-family: var(--serif); font-size: 1.1rem; font-weight: 600; color: var(--ink); }
    .mon .smr { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); letter-spacing: 0.05em; }
    .mon .dist { font-family: var(--mono); font-size: 0.74rem; color: var(--accent); white-space: nowrap; }
    .mon .note { font-family: var(--serif); font-size: 0.98rem; line-height: 1.6;
      color: var(--muted); margin-top: 8px; max-width: 720px; }
    .empty { font-family: var(--mono); font-size: 0.8rem; color: var(--muted); font-style: normal; }

    /* ---- Ambiguous county picker ---- */
    .ambiguous p { font-family: var(--mono); font-size: 0.85rem; color: var(--ink);
      letter-spacing: 0.04em; margin: 0 0 18px; }
    .county-pick { display: inline-flex; align-items: center; gap: 8px;
      margin: 0 10px 10px 0; padding: 10px 16px; cursor: pointer; background: transparent;
      border: 1px solid var(--faint); border-radius: 9px; color: var(--ink);
      font-family: var(--mono); font-size: 0.78rem; letter-spacing: 0.12em;
      transition: border-color 0.16s ease, color 0.16s ease; }
    .county-pick:hover { border-color: var(--accent); color: var(--accent); }

    /* ---- Colophon (borrowed pattern: mono labels over content) ---- */
    footer { max-width: 1040px; margin: 40px auto 0; padding: 40px 26px 60px;
      border-top: 1px solid var(--faint); }
    .colophon { display: grid; grid-template-columns: repeat(2, 1fr); gap: 34px 24px; }
    .col-label { font-family: var(--mono); font-size: 0.64rem; letter-spacing: 0.26em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .col-body { font-family: var(--mono); font-size: 0.86rem; line-height: 1.9; color: var(--ink); }
    .col-body a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--faint); }
    .col-body a:hover { color: var(--accent); border-color: var(--accent); }

    @media (max-width: 620px) {
      .field-grid { grid-template-columns: 1fr; }
      .hero { padding: 56px 0 24px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="pill">
      <span class="wordmark">AN&nbsp;ÁIT</span>
      <span class="tag">Éire · geo-history</span>
    </div>
  </header>

  <main>
    <section class="hero">
      <p class="eyebrow rise">Irish townland histories</p>
      <h1 class="title rise" style="animation-delay:0.06s">An <span class="accent">Áit</span></h1>
      <p class="tagline rise" style="animation-delay:0.12s">
        <span class="b">The name remembers.</span><br>
        <span class="a">The land remembers.</span>
      </p>
    </section>

    <section class="panel rise" style="animation-delay:0.18s">
      <div class="field-grid">
        <div>
          <label for="townland">Townland</label>
          <input type="text" id="townland" placeholder="e.g. Ballinakill" autocomplete="off">
        </div>
        <div>
          <label for="county">County <span class="opt">— optional</span></label>
          <input type="text" id="county" placeholder="e.g. Laois" autocomplete="off">
        </div>
      </div>

      <div class="radius-row">
        <label for="radius">Search the land within
          <span class="val"><span id="radiusVal">2.0</span> km</span></label>
        <input type="range" id="radius" min="0.5" max="10" step="0.5" value="2">
      </div>

      <button class="btn" id="go" onclick="lookup()">
        Reveal the history <span class="arrow">↗</span>
      </button>
      <div id="status"></div>
    </section>

    <section id="result"></section>
  </main>

  <footer>
    <div class="colophon">
      <div>
        <div class="col-label">Sources</div>
        <div class="col-body">
          <a href="https://www.logainm.ie" target="_blank" rel="noopener">Logainm.ie</a><br>
          <a href="https://www.archaeology.ie" target="_blank" rel="noopener">Archaeological Survey</a>
        </div>
      </div>
      <div>
        <div class="col-label">Synthesis</div>
        <div class="col-body">Claude (Sonnet)<br>grounded in records</div>
      </div>
      <div>
        <div class="col-label">Licence</div>
        <div class="col-body">Data CC&nbsp;BY&nbsp;4.0</div>
      </div>
      <div>
        <div class="col-label">Year</div>
        <div class="col-body">2026<br>Ongoing</div>
      </div>
    </div>
  </footer>

<script>
  // Keep the radius label in step with the slider.
  const radius = document.getElementById('radius');
  const radiusVal = document.getElementById('radiusVal');
  radius.addEventListener('input', () => radiusVal.textContent = (+radius.value).toFixed(1));

  // Submit on Enter from either text field.
  ['townland', 'county'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); }));

  // Tiny, safe markdown -> HTML for the synthesis. We escape first (so nothing
  // in the data can inject HTML), then turn a few markdown bits into tags.
  function format(text) {
    const esc = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return esc
      .replace(/^#{1,6}\s*(.+)$/gm, '<h2>$1</h2>')          // headings
      .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')                // bold
      .replace(/\*(.+?)\*/g, '<em>$1</em>')                  // italics
      .split(/\n\s*\n/).map(p => p.startsWith('<h2>') ? p : '<p>' + p + '</p>').join('');
  }

  async function lookup(forceCounty) {
    const townland = document.getElementById('townland').value;
    const county = (forceCounty !== undefined) ? forceCounty : document.getElementById('county').value;
    if (forceCounty !== undefined) document.getElementById('county').value = forceCounty;

    const btn = document.getElementById('go');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');

    btn.disabled = true;
    resultEl.style.display = 'none';
    statusEl.innerHTML = 'consulting the records &amp; the land<span class="cursor">_</span>';

    try {
      const res = await fetch('/lookup', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ townland, county, radius: radius.value })
      });
      const data = await res.json();
      render(data);
    } catch (e) {
      statusEl.textContent = '! something went wrong reaching the server.';
    } finally {
      btn.disabled = false;
    }
  }

  function render(data) {
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    statusEl.textContent = '';

    if (data.status === 'not_found') {
      statusEl.textContent = '∅ no place of that name was found. check the spelling, or try without a county.';
      return;
    }
    if (data.status === 'error') {
      statusEl.textContent = '! error: ' + data.message;
      return;
    }
    if (data.status === 'ambiguous') {
      let html = '<div class="ambiguous"><p>That name appears in several counties. Which one?</p>';
      data.counties.forEach(c => {
        html += `<button class="county-pick" onclick="lookup('${c}')">${c} ↗</button>`;
      });
      html += '</div>';
      show(resultEl, html);
      return;
    }

    // status === 'ok'
    const p = data.place;
    const coord = p.latitude ? p.latitude.toFixed(4) + ', ' + p.longitude.toFixed(4) : null;
    let html = `
      <div class="place-head">
        <h2 class="irish">${p.irish_name || p.english_name}</h2>
        <div class="english">${p.english_name}${p.irish_genitive ? ' · gen. ' + p.irish_genitive : ''}</div>
        <div class="meta">${(p.feature_type || '').toUpperCase()}<span class="dot">·</span>Co. ${p.county || '—'}${coord ? '<span class="dot">·</span>' + coord : ''}${p.logainm_url ? '<span class="dot">·</span><a href="' + p.logainm_url + '" target="_blank" rel="noopener">Logainm ↗</a>' : ''}</div>
      </div>
      <div class="synthesis">${format(data.synthesis)}</div>
    `;

    // The evidence drawer — closed by default, open it to check the grounding.
    html += `<details class="evidence"><summary>Evidence · ${data.monuments.length} monument${data.monuments.length === 1 ? '' : 's'} on record</summary>`;
    if (p.etymology && p.etymology.length) {
      html += '<div class="ety">';
      p.etymology.forEach(e => html += `<span><b>${e.word}</b> — ${e.meaning}</span>`);
      html += '</div>';
    }
    if (data.monuments.length) {
      data.monuments.forEach(m => {
        const note = (m.description || '').replace(/\s+/g, ' ').slice(0, 280);
        const smr = m.smr_number ? `<span class="smr">${m.smr_number}</span>` : '';
        html += `<div class="mon">
          <div class="top"><span class="type">${m.monument_class || 'Unknown'} ${smr}</span>
          <span class="dist">${m.distance_km} km</span></div>
          ${note ? `<div class="note">${note}${note.length >= 280 ? '…' : ''}</div>` : ''}</div>`;
      });
    } else {
      html += '<p class="empty">No recorded monuments within the radius.</p>';
    }
    html += '</details>';

    show(resultEl, html);
  }

  // Swap in new content and replay the rise animation.
  function show(el, html) {
    el.innerHTML = html;
    el.style.display = 'block';
    el.classList.remove('rise'); void el.offsetWidth; el.classList.add('rise');
  }
</script>
</body>
</html>
